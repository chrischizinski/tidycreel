name: Bug report
description: "Report a bug in tidycreel"
labels: ["bug"]
assignees: []
body:
  - type: dropdown
    id: survey_type
    attributes:
      label: Survey type
      description: Which survey type is affected?
      options:
        - instantaneous
        - bus_route
        - ice
        - camera
        - aerial
        - "not applicable / unsure"
    validations:
      required: true

  - type: input
    id: tidycreel_version
    attributes:
      label: tidycreel version
      description: "Output of `packageVersion('tidycreel')` or the version shown in sessionInfo()"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What actually happened? Include the full error message if there is one."
    validations:
      required: true

  - type: textarea
    id: reprex
    attributes:
      label: Minimal reproducible example (reprex)
      description: "A self-contained R snippet that reproduces the issue. Use `reprex::reprex()` if possible."
      render: r
    validations:
      required: false

  - type: textarea
    id: session_info
    attributes:
      label: sessionInfo()
      description: "Paste the full output of `utils::sessionInfo()`."
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else.
    validations:
      required: false
